<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const url = window.location.pathname.split("/")
        window.route = url[1] === "level" ? `/${url[1]}/` : ""

        const init = async () => {
            const loadApp = await import(`${window.route}/app/runtime/loadApp.js`)
            loadApp.init()
        }
        init()
    </script>

</body>

</html>
